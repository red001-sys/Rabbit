workflows:
  build-apk:
    name: Rabbit

    environment:
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
