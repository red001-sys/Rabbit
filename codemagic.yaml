workflows:
  build-apk:
    name: Rabbit APK Build

    environment:
      node: 22
      java: 17

    scripts:
      - name: Force Java 17
        script: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
          export PATH=$JAVA_HOME/bin:$PATH
          java -version

      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
