name: Build Android App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Baixar código
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2️⃣ Instalar NodeJS >= 22
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 3️⃣ Instalar dependências
      - name: Instalar dependências
        run: npm install

      # 4️⃣ Build do projeto web (Vite)
      - name: Build do Vite
        run: npm run build

      # 5️⃣ Sincronizar Capacitor
      - name: Sincronizar Capacitor Android
        run: npx cap sync android

      # 6️⃣ Instalar Java (Temurin 21)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 7️⃣ Build APK Debug
      - name: Build APK Debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8️⃣ Build APK Release
      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 9️⃣ Build AAB Release
      - name: Build AAB Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      # 🔟 Salvar artefatos para download
      - name: Salvar APK e AAB
        uses: actions/upload-artifact@v4
        with:
          name: nutri-app-builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
